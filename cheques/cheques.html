
<div class="contenedor-cheques">
    <h2 class="titulo-seccion">Simulador de Cheques Diferidos</h2>
    
    <div class="formulario-card">
        <div class="input-group">
            <label>Total de la Operación ($)</label>
            <input type="text" id="chq-monto" placeholder="Ej: 15.000.000" onkeyup="formatearMoneda(this)">
        </div>
        <div class="input-group">
            <label>Tasa Nominal Anual (TNA %)</label>
            <input type="number" id="chq-tna" placeholder="Ej: 35" step="0.1">
        </div>
    </div>

    <h4 class="leyenda-input" style="margin-top: 20px;">Seleccioná el esquema de cheques:</h4>
    <div class="grid-plazos-cheques">
        <button class="btn-chq" onclick="calcularCheques(1)">0 / 30</button>
        <button class="btn-chq" onclick="calcularCheques(2)">0 / 30 / 60</button>
        <button class="btn-chq" onclick="calcularCheques(3)">0 / 30 / 60 / 90</button>
        <button class="btn-chq" onclick="calcularCheques(4)">0 / 30 / 60 / 90 / 120</button>
    </div>
    
    <div class="alerta-gerencia">
        ⚠️ Para plazos mayores a 120 días, por favor consultar autorización con la Gerencia de Finanzas.
    </div>

    <div id="resultado-cheques" class="cuadro-resultados" style="display: none; margin-top: 25px;">
        <!-- Acá se inyectan los resultados con JS -->
    </div>
</div>
